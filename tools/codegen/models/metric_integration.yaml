                    - api_name: endpoint
                      tf_schema_name: endpoint
                    - api_name: headers
                      tf_schema_name: headers
        property_name:
            api_name: integrationType
            tf_schema_name: integration_type
    attributes:
        - string: {}
          description: The temporality to send to the metric integration.
          computed_optional_required: required
          tf_schema_name: aggregation_temporality
          tf_model_name: AggregationTemporality
          api_name: aggregationTemporality
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - string: {}
