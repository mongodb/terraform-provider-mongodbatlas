          tf_schema_name: endpoint
          tf_model_name: Endpoint
          api_name: endpoint
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - string: {}
          description: |-
            Unique 24-hexadecimal digit string that identifies your project. Use the [/groups](#tag/Projects/operation/listProjects) endpoint to retrieve all projects to which the authenticated user has access.

            **NOTE**: Groups and projects are synonymous terms. Your group id is the same as your project id. For existing groups, your group/project id remains the same. The resource and corresponding endpoints use the term groups.
          computed_optional_required: required
          tf_schema_name: group_id
          tf_model_name: GroupId
          api_name: groupId
          req_body_usage: omit_always
          sensitive: false
          create_only: true
          present_in_any_response: false
          request_only_required_on_create: false
        - list_nested:
            nested_object:
                attributes:
                    - string: {}
                      description: Header name.
                      computed_optional_required: required
                      tf_schema_name: name
                      tf_model_name: Name
                      api_name: name
                      req_body_usage: all_request_bodies
                      sensitive: false
                      create_only: false
                      present_in_any_response: true
                      request_only_required_on_create: false
                    - string: {}
                      description: Header value.
                      computed_optional_required: required
                      tf_schema_name: value
                      tf_model_name: Value
                      api_name: value
                      req_body_usage: all_request_bodies
                      sensitive: true
                      create_only: false
                      present_in_any_response: true
                      request_only_required_on_create: false
          description: HTTP headers for authentication and configuration. Maximum 10 headers, total size limit 2KB.
          custom_type:
            package: customtypes
            name: Headers
            model: customtypes.NestedListValue[TFHeadersModel]
            schema: customtypes.NewNestedListType[TFHeadersModel](ctx)
          computed_optional_required: optional
          tf_schema_name: headers
          tf_model_name: Headers
          api_name: headers
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - string: {}
          description: Unique 24-character hexadecimal digit string that identifies the metric integration configuration.
          computed_optional_required: required
          tf_schema_name: id
          tf_model_name: Id
          api_name: id
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - string: {}
          description: Type of metric integration. Identifies which protocol will be used for the integration. This value cannot be modified after the integration is created.
          computed_optional_required: required
          tf_schema_name: integration_type
          tf_model_name: IntegrationType
          api_name: integrationType
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - set:
            element_type: 4
          description: Array of metric categories to export. Determines which types of metrics are sent to the integration.
          custom_type:
            package: customtypes
            model: customtypes.SetValue[types.String]
            schema: customtypes.NewSetType[types.String](ctx)
          computed_optional_required: required
          tf_schema_name: metric_selection
          tf_model_name: MetricSelection
          api_name: metricSelection
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - string: {}
          description: The provider type for the metric integration. Identifies the third-party service provider.
          computed_optional_required: required
          tf_schema_name: provider_type
          tf_model_name: ProviderType
          api_name: providerType
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
