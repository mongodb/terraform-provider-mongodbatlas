schema:
    description: Updates the settings of the specified project. You can update any of the options available. MongoDB cloud only updates the options provided in the request.
    attributes:
        - string: {}
          description: Unique 24-hexadecimal digit string that identifies your project, also known as `groupId` in the official documentation.
          computed_optional_required: required
          tf_schema_name: project_id
          tf_model_name: ProjectId
          api_name: groupId
          req_body_usage: omit_always
          sensitive: false
          create_only: true
          present_in_any_response: false
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether the AI Cluster Assistant is enabled for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_cluster_ai_assistant_enabled
          tf_model_name: IsClusterAiAssistantEnabled
          api_name: isClusterAiAssistantEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether to collect database-specific metrics for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_collect_database_specifics_statistics_enabled
          tf_model_name: IsCollectDatabaseSpecificsStatisticsEnabled
          api_name: isCollectDatabaseSpecificsStatisticsEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether to enable the Data Explorer for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_data_explorer_enabled
          tf_model_name: IsDataExplorerEnabled
          api_name: isDataExplorerEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether to enable the use of generative AI features which make requests to 3rd party services in Data Explorer for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_data_explorer_gen_ai_features_enabled
          tf_model_name: IsDataExplorerGenAIFeaturesEnabled
          api_name: isDataExplorerGenAIFeaturesEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool:
            default: false
          description: Flag that indicates whether to enable the passing of sample field values with the use of generative AI features in the Data Explorer for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_data_explorer_gen_ai_sample_document_passing_enabled
          tf_model_name: IsDataExplorerGenAISampleDocumentPassingEnabled
          api_name: isDataExplorerGenAISampleDocumentPassingEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether data validation is enabled for all clusters in the specified project.
          computed_optional_required: optional
          tf_schema_name: is_data_validation_enabled
          tf_model_name: IsDataValidationEnabled
          api_name: isDataValidationEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether to enable extended storage sizes for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_extended_storage_sizes_enabled
          tf_model_name: IsExtendedStorageSizesEnabled
          api_name: isExtendedStorageSizesEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether to enable Native Reranking with Voyage AI models in the Aggregation Pipeline for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_native_reranking_enabled
          tf_model_name: IsNativeRerankingEnabled
          api_name: isNativeRerankingEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether to enable the Performance Advisor and Profiler for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_performance_advisor_enabled
          tf_model_name: IsPerformanceAdvisorEnabled
          api_name: isPerformanceAdvisorEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether to enable the Real Time Performance Panel for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_realtime_performance_panel_enabled
          tf_model_name: IsRealtimePerformancePanelEnabled
          api_name: isRealtimePerformancePanelEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
        - bool: {}
          description: Flag that indicates whether to enable the Schema Advisor for the specified project.
          computed_optional_required: computed_optional
          tf_schema_name: is_schema_advisor_enabled
          tf_model_name: IsSchemaAdvisorEnabled
          api_name: isSchemaAdvisorEnabled
          req_body_usage: all_request_bodies
          sensitive: false
          create_only: false
          present_in_any_response: true
          request_only_required_on_create: false
operations:
    create:
        http_method: PATCH
        path: /api/atlas/v2/groups/{projectId}/settings
    read:
        http_method: GET
        path: /api/atlas/v2/groups/{projectId}/settings
    update:
        http_method: PATCH
        path: /api/atlas/v2/groups/{projectId}/settings
    version_header: application/vnd.atlas.2023-01-01+json
name: project_settings_api
packageName: projectsettingsapi
