variables:
  # API descriptions mention using the /orgs and /groups endpoints to fetch user's orgs/projects, removing that part.
  org_id_description: &org_id_description "Unique 24-hexadecimal digit string that identifies the organization that contains your projects."
  project_id_description: &project_id_description "Unique 24-hexadecimal digit string that identifies your project, also known as `groupId` in the official documentation."

resources:
  # TODO: Voyage resources, add to provider list before merging to master in CLOUDP-372674
  ai_model_api_key:
    create:
      path: &ai_model_api_key_collection_path /api/atlas/v2/groups/{groupId}/aiModelApiKeys
      method: POST
    read: &ai-model-api-key-read-op
      path: &ai_model_api_key_item_path /api/atlas/v2/groups/{groupId}/aiModelApiKeys/{apiKeyId}
      method: GET
    update:
      path: *ai_model_api_key_item_path
      method: PATCH
    delete:
      path: *ai_model_api_key_item_path
      method: DELETE
    version_header: application/vnd.atlas.2025-03-12+json
    schema: &ai_model_api_key_schema
      aliases:
        groupId: projectId
        results.groupId: projectId
      overrides:
        project_id:
          description: *project_id_description
        api_key_id:
          immutable_computed: true
        created_at:
          immutable_computed: true # Reduces plan verbosity.
        created_by:
          immutable_computed: true # Reduces plan verbosity.
        endpoint:
          immutable_computed: true
        masked_secret:
          immutable_computed: true # Reduces plan verbosity.
        secret:
          immutable_computed: true # Preserves value in state across updates, reduces plan verbosity.
    datasources:
      read: *ai-model-api-key-read-op
      list:
        path: *ai_model_api_key_collection_path
        method: GET
      schema:
        <<: *ai_model_api_key_schema
        ignores: ["secret", "results.secret"]

  ai_model_org_api_key:
    version_header: application/vnd.atlas.2025-03-12+json
    datasources:
      read:
        path: /api/atlas/v2/orgs/{orgId}/aiModelApiKeys/{apiKeyId}
        method: GET
      list:
        path: /api/atlas/v2/orgs/{orgId}/aiModelApiKeys
        method: GET
      schema:
        aliases:
          groupId: projectId
          results.groupId: projectId
        overrides:
          org_id:
            description: *org_id_description
          project_id:
            description: *project_id_description
        ignores: ["secret", "results.secret"]

  ai_model_org_rate_limit:
    version_header: application/vnd.atlas.preview+json
    datasources:
      read:
        path: /api/atlas/v2/orgs/{orgId}/aiModelRateLimits/{modelGroupName}
        method: GET
      list:
        path: /api/atlas/v2/orgs/{orgId}/aiModelRateLimits
        method: GET
      schema:
        overrides:
          org_id:
            description: *org_id_description

  # PATCH is used for Create and Update, reset custom method for Delete.
  ai_model_rate_limit:
    create:
      path: &ai_model_rate_limit_item_path /api/atlas/v2/groups/{groupId}/aiModelRateLimits/{modelGroupName}
      method: PATCH
    read: &ai_model_rate_limit_read_op
      path: *ai_model_rate_limit_item_path
      method: GET
    update:
      path: *ai_model_rate_limit_item_path
      method: PATCH
    delete:
      path: /api/atlas/v2/groups/{groupId}/aiModelRateLimits/{modelGroupName}:reset
      method: POST
    version_header: application/vnd.atlas.preview+json
    schema: &ai_model_rate_limit_schema
      aliases:
        groupId: projectId
      overrides:
        project_id:
          description: *project_id_description
    datasources:
      read: *ai_model_rate_limit_read_op
      list:
        path: /api/atlas/v2/groups/{groupId}/aiModelRateLimits
        method: GET
      schema:
        <<: *ai_model_rate_limit_schema

  # Singleton resource in project.
  # Create, Delete and Update uses PATCH.
  auditing_api:
    read:
      path: /api/atlas/v2/groups/{groupId}/auditLog
      method: GET
    create:
      path: /api/atlas/v2/groups/{groupId}/auditLog
      method: PATCH
    update:
      path: /api/atlas/v2/groups/{groupId}/auditLog
      method: PATCH
    delete:
      path: /api/atlas/v2/groups/{groupId}/auditLog
      method: PATCH
      static_request_body: '{"enabled": "false"}'
      resets_to_defaults: true
    version_header: application/vnd.atlas.2023-01-01+json

  cluster_old_api:
    deprecation_message: "This resource is deprecated. Please use the mongodbatlas_cluster_api resource instead."
    read:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}
      method: GET
    create:
      path: /api/atlas/v2/groups/{groupId}/clusters
      method: POST
      wait: &cluster-create-wait
        state_property: "stateName"
        pending_states:
          [
            "CREATING",
            "UPDATING",
            "REPAIRING",
            "REPEATING",
            "PENDING",
            "DELETING",
          ]
        target_states: ["IDLE"]
        timeout_seconds: 10800 # 3 hours
        min_timeout_seconds: 60
        delay_seconds: 30
    update:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}
      method: PATCH
      wait: *cluster-create-wait
    delete:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}
      method: DELETE
      wait:
        <<: *cluster-create-wait
        pending_states:
          [
            "IDLE",
            "CREATING",
            "UPDATING",
            "REPAIRING",
            "REPEATING",
            "PENDING",
            "DELETING",
