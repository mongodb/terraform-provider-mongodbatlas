  custom_db_role_api:
    read:
      path: /api/atlas/v2/groups/{groupId}/customDBRoles/roles/{roleName}
      method: GET
    create:
      path: /api/atlas/v2/groups/{groupId}/customDBRoles/roles
      method: POST
    update:
      path: /api/atlas/v2/groups/{groupId}/customDBRoles/roles/{roleName}
      method: PATCH
    delete:
      path: /api/atlas/v2/groups/{groupId}/customDBRoles/roles/{roleName}
      method: DELETE
    version_header: application/vnd.atlas.2023-01-01+json

  database_user_api:
    read:
      path: /api/atlas/v2/groups/{groupId}/databaseUsers/{databaseName}/{username}
      method: GET
    create:
      path: /api/atlas/v2/groups/{groupId}/databaseUsers
      method: POST
    update:
      path: /api/atlas/v2/groups/{groupId}/databaseUsers/{databaseName}/{username}
      method: PATCH
    delete:
      path: /api/atlas/v2/groups/{groupId}/databaseUsers/{databaseName}/{username}
      method: DELETE
    version_header: application/vnd.atlas.2023-01-01+json
    schema:
      ignores: ["links"]
      aliases:
        username: dbUser # alias is only added to illustrate full aliasing support (username is both a path param and present in request body)
      overrides:
        password:
          sensitive: true
        description:
          request_body_usage: "send_null_as_null_on_update"

  # Singleton resource in project.
  # Create uses PATCH.
  maintenance_window_api:
    read:
      path: /api/atlas/v2/groups/{groupId}/maintenanceWindow
      method: GET
    create:
      path: /api/atlas/v2/groups/{groupId}/maintenanceWindow
      method: PATCH
    update:
      path: /api/atlas/v2/groups/{groupId}/maintenanceWindow
      method: PATCH
    delete:
      path: /api/atlas/v2/groups/{groupId}/maintenanceWindow
      method: DELETE
      resets_to_defaults: true
    version_header: application/vnd.atlas.2023-01-01+json
    schema:
      overrides:
        hour_of_day: # hour_of_day should be Required in API spec, getting this error if not set: ATLAS_INVALID_MAINTENANCE_WINDOW_HOUR_OF_DAY.
          computability:
            required: true
        auto_defer_once_enabled: # optional but when not configured, Atlas returns a default value.
          computability:
            optional: true
            computed: true
        start_asap: # "This flag resets to false after MongoDB Cloud completes maintenance."
          computability:
            computed: true

  # Singleton resource in project.
  # Create uses PATCH.
  project_settings_api:
    read:
      path: /api/atlas/v2/groups/{groupId}/settings
      method: GET
    create:
      path: /api/atlas/v2/groups/{groupId}/settings
      method: PATCH
    update:
      path: /api/atlas/v2/groups/{groupId}/settings
      method: PATCH
    version_header: application/vnd.atlas.2023-01-01+json
    schema:
      aliases:
        groupId: projectId
      overrides:
        project_id:
          description: *project_id_description
        # These attributes are optional but when not configured, Atlas returns a default value.
        is_collect_database_specifics_statistics_enabled:
          computability:
            optional: true
            computed: true
        is_data_explorer_enabled:
          computability:
            optional: true
            computed: true
        is_extended_storage_sizes_enabled:
          computability:
            optional: true
            computed: true
        is_performance_advisor_enabled:
          computability:
            optional: true
            computed: true
        is_realtime_performance_panel_enabled:
          computability:
            optional: true
            computed: true
        is_schema_advisor_enabled:
          computability:
            optional: true
            computed: true
        is_data_explorer_gen_ai_features_enabled:
          computability:
            optional: true
            computed: true
        is_cluster_ai_assistant_enabled:
          computability:
            optional: true
            computed: true
        is_native_reranking_enabled:
          computability:
            optional: true
            computed: true

  project_api:
    read:
      path: /api/atlas/v2/groups/{groupId}
      method: GET
    create:
      path: /api/atlas/v2/groups
      method: POST
    update:
      path: /api/atlas/v2/groups/{groupId}
      method: PATCH
    delete:
      path: /api/atlas/v2/groups/{groupId}
      method: DELETE
    version_header: application/vnd.atlas.2023-01-01+json
    schema:
      ignores: ["links"]
      aliases:
        groupId: id # path param name does not match the API response property

  push_based_log_export_api:
    read:
      path: /api/atlas/v2/groups/{groupId}/pushBasedLogExport
      method: GET
    create:
      path: /api/atlas/v2/groups/{groupId}/pushBasedLogExport
      method: POST
      wait: &pble-create-wait
        state_property: "state"
        pending_states: ["INITIATING", "BUCKET_VERIFIED"]
        target_states: ["ACTIVE"]
        timeout_seconds: 900 # 15 minutes
        min_timeout_seconds: 60
        delay_seconds: 10
    update:
      path: /api/atlas/v2/groups/{groupId}/pushBasedLogExport
      method: PATCH
      wait: *pble-create-wait
    delete:
      path: /api/atlas/v2/groups/{groupId}/pushBasedLogExport
      method: DELETE
      wait:
        <<: *pble-create-wait
        pending_states: ["ACTIVE", "INITIATING", "BUCKET_VERIFIED"]
        target_states: ["UNCONFIGURED", "DELETED"] # DELETED is a special state value when API returns 404 or empty object
    version_header: application/vnd.atlas.2023-01-01+json
    schema:
      ignores: ["links"]

  resource_policy_api:
    read:
      path: /api/atlas/v2/orgs/{orgId}/resourcePolicies/{resourcePolicyId}
      method: GET
    create:
      path: /api/atlas/v2/orgs/{orgId}/resourcePolicies
      method: POST
    update:
      path: /api/atlas/v2/orgs/{orgId}/resourcePolicies/{resourcePolicyId}
      method: PATCH
    delete:
      path: /api/atlas/v2/orgs/{orgId}/resourcePolicies/{resourcePolicyId}
      method: DELETE
    version_header: application/vnd.atlas.2024-08-05+json
    schema:
      aliases:
        resourcePolicyId: id # path param name does not match the API response property

  search_deployment_api:
    read:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}/search/deployment
      method: GET
    create:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}/search/deployment
      method: POST
      wait: &search-deployment-create-wait
        state_property: "stateName"
        pending_states: ["UPDATING", "PAUSED"]
        target_states: ["IDLE"]
        timeout_seconds: 10800 # 3 hours
        min_timeout_seconds: 60
        delay_seconds: 60
    update:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}/search/deployment
      method: PATCH
      wait: *search-deployment-create-wait
    delete:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}/search/deployment
      method: DELETE
      wait:
        <<: *search-deployment-create-wait
        min_timeout_seconds: 30
        pending_states: ["IDLE", "UPDATING", "PAUSED"]
        target_states: ["DELETED"] # DELETED is a special state value when API returns 404 or empty object
    version_header: application/vnd.atlas.2025-03-12+json

  search_index_api:
    read:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}/search/indexes/{indexId}
      method: GET
    create:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}/search/indexes
      method: POST
      wait: &search-index-create-wait
        state_property: "status"
        pending_states: ["PENDING", "BUILDING", "IN_PROGRESS", "MIGRATING"]
        target_states: ["READY", "STEADY"]
        timeout_seconds: 10800 # 3 hours
        min_timeout_seconds: 30
        delay_seconds: 30
    update:
      path: /api/atlas/v2/groups/{groupId}/clusters/{clusterName}/search/indexes/{indexId}
      method: PATCH
      wait:
        <<: *search-index-create-wait
    delete:
