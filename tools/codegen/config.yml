        target_states: ["READY"]
        timeout_seconds: 300
        min_timeout_seconds: 10
        delay_seconds: 10
    update:
      path: /api/atlas/v2/groups/{groupId}/streams/{tenantName}/connections/{connectionName}
      method: PATCH
