            optional: true
            computed: true
        bi_connector.read_preference:
          computability:
            optional: true
            computed: true
        disk_iops:
          computability:
            optional: true
            computed: true
        disk_size_gb:
          computability:
            optional: true
            computed: true
        encryption_at_rest_provider:
          computability:
            optional: true
            computed: true
        global_cluster_self_managed_sharding:
          computability:
            optional: true
            computed: true
        paused:
          computability:
            optional: true
            computed: true
        pit_enabled:
