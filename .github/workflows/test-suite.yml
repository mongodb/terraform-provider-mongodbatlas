name: 'Test Suite'

# Runs acceptance and migrations tests with a set of terraform versions and provider versions (used for migration tests).
# This workflow is scheduled daily with different authentication methods based on the day:
#   - Sunday: PAK against QA environment
#   - Monday, Wednesday, Friday: PAK against Dev environment
#   - Tuesday, Thursday, Saturday: SA against Dev environment
# Note: PAK refers to Programmatic API Key authentication (use_sa: false), SA refers to Service Account authentication (use_sa: true)
# It can also be run manually.
# Pending change in CLOUDP-353513: Once we enable terraform-compatibility-matrix.yml, we may want to skip the test-suite on those days (see schedule->cron below).
on:
  workflow_dispatch:
    inputs:
      terraform_matrix:
        description: 'Terraform version matrix (JSON array)'
        default: '["1.14.x","1.13.x","1.12.x","1.11.x","1.10.x","1.9.x","1.8.x"]'
      provider_matrix:
        description: 'Previous MongoDB Atlas Provider version matrix for migration tests (JSON array)'
        default: '[""]' # "" for latest version
      send_notification:
        description: 'Send a Slack notification to the streams team if stream tests fail.'
        type: boolean
        default: false
      trigger_test_summary:
        description: 'Generate an AI summary of the run and post it to Slack.'
        type: boolean
        default: false
      use_sa:
        description: "Run tests using Service Account instead of API Keys"
        type: boolean
        default: false
  workflow_call:
    inputs:
      terraform_matrix:
        description: 'Terraform version matrix (JSON array)'
        type: string
      provider_matrix:
        description: 'Previous MongoDB Atlas Provider version matrix for migration tests (JSON array)'
        type: string
        default: '[""]' # "" for latest version
      atlas_cloud_env:
        description: 'Atlas cloud environment used, can be either `dev` or `qa`, empty for `dev`'     
        type: string
        required: false
      send_notification:
        description: 'Send a Slack notification to the streams team if stream tests fail.'
        type: boolean
        default: false
      trigger_test_summary:
        description: 'Generate an AI summary of the run and post it to Slack.'
        type: boolean
        default: false
      use_sa:
        description: "Run tests using Service Account instead of API Keys"
        type: boolean
        default: false  
  schedule:
    - cron: "0 0 * * *" # workflow runs every day at midnight UTC

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: false
   
jobs:
  variables:
    env:
      schedule_terraform_matrix: '["1.14.x"]'
      schedule_provider_matrix: '[""]' # "" for latest version    
    runs-on: ubuntu-latest
    outputs:
      terraform_matrix: ${{ inputs.terraform_matrix || env.schedule_terraform_matrix }}
      provider_matrix: ${{ inputs.provider_matrix || env.schedule_provider_matrix }}
      is_sun: ${{ steps.set_day.outputs.DAY == 'Sun' }}
      use_sa: ${{ inputs.use_sa == true || (github.event_name == 'schedule' && (steps.set_day.outputs.DAY == 'Tue' || steps.set_day.outputs.DAY == 'Thu' || steps.set_day.outputs.DAY == 'Sat')) }}
      send_notification: ${{ github.event_name == 'schedule' || inputs.send_notification == true }}
      trigger_test_summary: ${{ github.event_name == 'schedule' || inputs.trigger_test_summary == true }}
    steps:
      - name: set day
        id: set_day
        run: |
          echo "DAY=$(date +'%a')"
          echo "DAY=$(date +'%a')" >> "$GITHUB_OUTPUT"
  clean-before:
    secrets: inherit
    uses: ./.github/workflows/cleanup-test-env.yml

  tests:
    needs: [clean-before, variables]
    if: ${{ !cancelled() }}
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        terraform_version: ${{ fromJSON(needs.variables.outputs.terraform_matrix) }}
        provider_version: ${{ fromJSON(needs.variables.outputs.provider_matrix) }}
    name: ${{ matrix.terraform_version || 'latest' }}-${{ matrix.provider_version || 'latest' }}-${{ needs.variables.outputs.use_sa == 'true' && 'sa' || 'pak' }}
    secrets: inherit
    uses: ./.github/workflows/acceptance-tests.yml
    with:
      terraform_version: ${{ matrix.terraform_version }}
      provider_version: ${{ matrix.provider_version }}
      atlas_cloud_env: ${{ inputs.atlas_cloud_env || needs.variables.outputs.is_sun == 'true' && 'qa' || '' }} # Run against QA on Sundays
      # Job output variables are always returned as strings.
      use_sa: ${{ needs.variables.outputs.use_sa == 'true' }}
      send_notification: ${{ needs.variables.outputs.send_notification == 'true' }}

  clean-after:
    needs: tests
    if: ${{ !cancelled() }}
    secrets: inherit
    uses: ./.github/workflows/cleanup-test-env.yml

  trigger-test-summary:
    needs: [tests, variables, clean-after]
    if: ${{ !cancelled() && needs.variables.outputs.trigger_test_summary == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Summarize test run
        id: summary
        uses: anthropics/claude-code-action@476e359e6203e73dad705c8b322e333fabbd7416
        with:
          anthropic_api_key: ${{ secrets.AI_GATEWAY_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Follow the skill at .agents/skills/summarize-test-suite/SKILL.md to summarize GitHub Actions run_id ${{ github.run_id }}. Return the final Slack mrkdwn summary as the `summary` field of the structured output, with no preamble and no fenced code block.
          claude_args: --max-turns 25 --allowedTools Bash,Read,Glob,Grep,Task --model claude-opus-4-7 --json-schema '{"type":"object","properties":{"summary":{"type":"string"}},"required":["summary"]}'
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.AI_GATEWAY_ANTHROPIC_URL }}
          ANTHROPIC_CUSTOM_HEADERS: "api-key: ${{ secrets.AI_GATEWAY_API_KEY }}"
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Post summary to Slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          errors: true
          payload: |
            {
              "text": "Test Suite #${{ github.run_number }} summary",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format('{0} {1}', secrets.SLACK_ONCALL_TAG, fromJSON(steps.summary.outputs.structured_output).summary)) }}
                  }
                }
              ]
            }
      - name: Fallback ping if any prior step failed
        if: ${{ failure() }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Test Suite #${{ github.run_number }} AI summary unavailable",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ secrets.SLACK_ONCALL_TAG }} :red_circle: Test Suite #${{ github.run_number }} — AI summary unavailable, check the run manually: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>."
                  }
                }
              ]
            }
