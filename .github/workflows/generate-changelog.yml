name: Generate Changelog
on:
  pull_request:
    types: [closed]
    branches: [master, v1-lts]
    paths:
      - .changelog/**
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Branch to update changelog on"
        required: false
        type: choice
        default: "master"
        options:
          - "master"
          - "v1-lts"
jobs:
  generate-and-update-changelog:
    if: github.event.pull_request.merged || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/templates/run-script-and-commit
        with:
          script_call: 'make tools update-changelog-unreleased-section'
          file_to_commit: 'CHANGELOG.md'
          commit_message: ${{ github.event_name == 'workflow_dispatch' && format('{0}{1}', 'chore:',' Updates CHANGELOG.md (Manual Trigger)') || format('{0}{1}{2}{3}', 'chore:', ' Updates CHANGELOG.md for ', '#', github.event.pull_request.number) }}
          apix_bot_pat: ${{ secrets.APIX_BOT_PAT }}
          remote: https://svc-apix-bot:${{ secrets.APIX_BOT_PAT }}@github.com/${{ github.repository }}
          gpg_private_key: ${{ secrets.APIX_BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.APIX_BOT_PASSPHRASE }}
          branch: ${{ github.event_name == 'workflow_dispatch' && inputs.base_branch || github.event.pull_request.base.ref }}

  slack-notification:
    needs: [generate-and-update-changelog]
    if: ${{ !cancelled() && needs.generate-and-update-changelog.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send Slack message
        id: slack
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ github.event.repository.name }}: Automatic Changelog update failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *${{ github.event.repository.name }}: Automatic Changelog update failed* ${{ secrets.SLACK_ONCALL_TAG }} <${{github.server_url}}/${{github.repository}}/actions/runs/${{github.run_id}}|View Failed Action>"
                  }
                }
              ]
            }
